<p-menubar [model]="items">
  <ng-template #start>
    <div class="flex items-center gap-4">
      <div class="endpoint-display" *ngIf="signalStore.state().communicationEndpoint">
        <span class="text-sm text-gray-600">API Endpoint:</span>
        <span class="font-mono text-sm bg-blue-100 px-2 py-1 rounded">
          {{ signalStore.state().communicationEndpoint }}
        </span>
      </div>
    </div>
  </ng-template>
  <ng-template #end>
    <div class="flex items-center gap-2">
      <span class="m-auto">
        @if (isDarkMode()) {
          🌜
        } @else {
          🌞
        }
      </span>
      <p-toggle-switch
        [ngModel]="isDarkMode()"
        (ngModelChange)="toggleDarkMode()"
      ></p-toggle-switch>
    </div>
  </ng-template>
</p-menubar>
<div class="ml-8 mr-8 mt-4">
<router-outlet />
</div>

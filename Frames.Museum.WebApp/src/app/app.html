<p-menubar [model]="items">
  <ng-template #end>
    <div class="flex items-center gap-2">
      <span class="m-auto">
        @if (isDarkMode()) {
          🌜
        } @else {
          🌞
        }
      </span>
      <p-toggle-switch
        [ngModel]="isDarkMode()"
        (ngModelChange)="toggleDarkMode()"
      ></p-toggle-switch>
    </div>

  </ng-template>
</p-menubar>
<div class="ml-8 mr-8 mt-4">
<router-outlet />
</div>

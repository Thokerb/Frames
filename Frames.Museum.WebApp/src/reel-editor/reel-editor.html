<h2 class="text-xl font-semibold mb-4">Reel Editor</h2>
<div class="editor-wrap">
  <div id="monaco-editor-root" class="monaco-editor-root"></div>


</div>
<div class="button-group">
  <p-button (onClick)="onClicK()" label="GENERATE" icon="pi pi-cog"></p-button>
  <p-button (onClick)="setSampleCode()" label="Load Sample" icon="pi pi-file"></p-button>
  <div class="send-request-group">
    <p-select
      [options]="coupledModels()"
      [(ngModel)]="selectedModel"
      placeholder="Select a model"
      optionLabel="label"
      optionValue="value"
      class="model-select">
    </p-select>
    <p-button (onClick)="sendRequest()" label="SEND REQUEST" icon="pi pi-send"></p-button>
  </div>
</div>
<div class="generated-code-section" *ngIf="generatedCode().length > 0">
  <div class="code-header">
    <h3 class="text-lg font-medium">Generated Code</h3>
    <p-button (onClick)="copyToClipboard()" label="COPY" icon="pi pi-copy" size="small"></p-button>
  </div>
  <div class="code-block">
    <pre><code>{{ formatJson(generatedCode()) }}</code></pre>
  </div>
</div>

@if (metrics().length > 0) {
  <p-table [value]="metrics()" class="p-datatable-gridlines">
    <ng-template pTemplate="header">
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Value</th>
        <th>Timestamp</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-metric>
      <tr>
        <td>{{ metric.id }}</td>
        <td>{{ metric.name }}</td>
        <td>{{ metric.value }}</td>
        <td>{{ metric.timestamp }}</td>
      </tr>
    </ng-template>
  </p-table>
} @else {
  <p>Waiting for metrics...</p>
}
